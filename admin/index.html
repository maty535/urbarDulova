<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>

    <!-- TENTO RIADOK CHÝBA V MANUÁLI, ALE JE NUTNÝ PRE GITHUB PAGES -->
    <link rel="netlify-identity-widget" href="https://urbardulova.netlify.app">
    
    <!-- NAHRANIE PRIHLASOVACIEHO OKNA -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <!-- SCRIPT NA OVLÁDANIE PRIHLÁSENIA -->
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>

    <!-- TENTO RIADOK JE Z TVOJHO MANUÁLU -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
