<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <!-- 1. Include the identity widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js" type="text/javascript"></script>
    
    <!-- 2. PRIDANÝ SKRIPT: Prepojenie na tvoje Netlify -->
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        // Povieme widgetu, kde presne sídli overovacia brána
        window.netlifyIdentity.setAPIURI("https://urbardulova.netlify.app/.netlify/identity");

        // Po úspešnom prihlásení obnovíme admin rozhranie
        window.netlifyIdentity.on("login", () => {
          document.location.href = "/admin/";
        });
      });
    </script>
  </head>
  <body>
    <!-- 3. Include the script that builds the page and powers Decap CMS -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  </body>
</html>
