<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <!-- 1. Nahranie Identity widgetu -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js" type="text/javascript"></script>
  </head>
  <body>
    <script>
      // Tento blok musí byť PRED načítaním samotného Decap CMS skriptu
      document.addEventListener("DOMContentLoaded", function() {
        // Ak widget existuje, nastavíme mu URL manuálne cez init
        if (window.netlifyIdentity) {
          window.netlifyIdentity.on("init", user => {
            if (!user) {
              window.netlifyIdentity.on("login", () => {
                document.location.href = "/admin/";
              });
            }
          });
        }
      });
    </script>

    <!-- 2. Nahranie Decap CMS -->
    <!-- Pridali sme sem konfiguračný objekt, ktorý povie Decapu, kde má hľadať Identity -->
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

    <script>
      // Alternatívny spôsob, ak setAPIURI zlyháva:
      // Povieme widgetu manuálne, kam sa má dívať, hneď po načítaní
      if (window.netlifyIdentity) {
        window.netlifyIdentity.setAPIURI("https://urbardulova.netlify.app/.netlify/identity");
      }
    </script>
  </body>
</html>
